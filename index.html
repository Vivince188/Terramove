<div class="container my-4">

<h1 class="text-center mb-4">🌍 TerraMove Monitoring Dashboard</h1>

<div class="row g-3" id="mainGrid">

    <!-- SENSOR UNITS WILL APPEAR HERE -->
    <div id="dataDisplay"></div>

    <!-- SIMULATOR -->
    <div class="col-md-4">

        <div class="card h-100 p-3">

            <h5 class="text-center mb-3">⚠ Risk Level Simulator</h5>

            <div class="row g-2">

                <div class="col-4">
                    <input type="number" class="form-control form-control-sm" id="accelX" placeholder="Accel X">
                </div>

                <div class="col-4">
                    <input type="number" class="form-control form-control-sm" id="accelY" placeholder="Accel Y">
                </div>

                <div class="col-4">
                    <input type="number" class="form-control form-control-sm" id="accelZ" placeholder="Accel Z">
                </div>

                <div class="col-4">
                    <input type="number" class="form-control form-control-sm" id="gyroX" placeholder="Gyro X">
                </div>

                <div class="col-4">
                    <input type="number" class="form-control form-control-sm" id="gyroY" placeholder="Gyro Y">
                </div>

                <div class="col-4">
                    <input type="number" class="form-control form-control-sm" id="gyroZ" placeholder="Gyro Z">
                </div>

                <div class="col-6">
                    <input type="number" class="form-control form-control-sm" id="vibration" placeholder="Vibration">
                </div>

                <div class="col-6">
                    <input type="number" class="form-control form-control-sm" id="tilt" placeholder="Tilt">
                </div>

                <div class="col-6">
                    <input type="number" class="form-control form-control-sm" id="soilMoisture" placeholder="Soil Moisture">
                </div>

                <div class="col-6">
                    <input type="number" class="form-control form-control-sm" id="rain" placeholder="Rain">
                </div>

            </div>

            <button onclick="simulateRisk()" class="btn btn-warning w-100 mt-3">
                Compute Risk
            </button>

            <div id="riskOutput" class="mt-3 text-center">
                Risk: -
            </div>

        </div>

    </div>

</div>

</div>
