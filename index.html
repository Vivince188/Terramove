<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>TerraMove Dashboard</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

<style>
body{
    background-color:#121212;
    color:#ffffff;
}

.card{
    background-color:#1e1e1e;
    border:1px solid #333;
}

/* Floating simulator */
#simulatorPanel{
    position:fixed;
    bottom:20px;
    right:20px;
    width:320px;
    max-height:90vh;
    overflow-y:auto;
    background:#1e1e1e;
    border:1px solid #444;
    border-radius:10px;
    padding:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.6);
}

#riskOutput{
    font-weight:bold;
    font-size:1.2rem;
    text-align:center;
}
</style>

</head>

<body>

<div class="container my-4">

<h1 class="text-center mb-4">🌍 TerraMove Monitoring Dashboard</h1>

<!-- Sensor Display -->
<div id="dataDisplay" class="row g-3"></div>

</div>

<!-- Risk Simulation Panel -->
<div id="simulatorPanel">

<h5 class="text-center mb-3">⚠ Risk Level Simulator</h5>

<form id="riskForm">

<div class="row g-2">

<div class="col-4">
<input type="number" step="0.01" class="form-control form-control-sm" id="accelX" placeholder="Accel X">
</div>

<div class="col-4">
<input type="number" step="0.01" class="form-control form-control-sm" id="accelY" placeholder="Accel Y">
</div>

<div class="col-4">
<input type="number" step="0.01" class="form-control form-control-sm" id="accelZ" placeholder="Accel Z">
</div>

<div class="col-4">
<input type="number" step="0.01" class="form-control form-control-sm" id="gyroX" placeholder="Gyro X">
</div>

<div class="col-4">
<input type="number" step="0.01" class="form-control form-control-sm" id="gyroY" placeholder="Gyro Y">
</div>

<div class="col-4">
<input type="number" step="0.01" class="form-control form-control-sm" id="gyroZ" placeholder="Gyro Z">
</div>

<div class="col-6">
<input type="number" step="0.01" class="form-control form-control-sm" id="vibration" placeholder="Vibration">
</div>

<div class="col-6">
<input type="number" step="0.01" class="form-control form-control-sm" id="tilt" placeholder="Tilt">
</div>

<div class="col-6">
<input type="number" step="0.01" class="form-control form-control-sm" id="soilMoisture" placeholder="Soil Moisture">
</div>

<div class="col-6">
<input type="number" step="0.01" class="form-control form-control-sm" id="rain" placeholder="Rain Level">
</div>

</div>

<button type="button" class="btn btn-warning w-100 mt-3" onclick="simulateRisk()">
Compute Risk Level
</button>

</form>

<div id="riskOutput" class="mt-3">
Risk: -
</div>

</div>


<!-- Firebase + Scripts -->
<script type="module" src="initDatabase.js"></script>
<script type="module" src="script.js"></script>

<script>

async function simulateRisk(){

const data = {
accelX: parseFloat(document.getElementById("accelX").value) || 0,
accelY: parseFloat(document.getElementById("accelY").value) || 0,
accelZ: parseFloat(document.getElementById("accelZ").value) || 0,

gyroX: parseFloat(document.getElementById("gyroX").value) || 0,
gyroY: parseFloat(document.getElementById("gyroY").value) || 0,
gyroZ: parseFloat(document.getElementById("gyroZ").value) || 0,

vibration: parseFloat(document.getElementById("vibration").value) || 0,
tilt: parseFloat(document.getElementById("tilt").value) || 0,
soilMoisture: parseFloat(document.getElementById("soilMoisture").value) || 0,
rain: parseFloat(document.getElementById("rain").value) || 0
};

try{

const response = await fetch("YOUR_FIREBASE_FUNCTION_URL",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

const result = await response.json();

document.getElementById("riskOutput").innerHTML =
"Risk: " + result.riskLevel;

}catch(error){

document.getElementById("riskOutput").innerHTML =
"Error computing risk";

console.error(error);

}

}

</script>

</body>
</html>
