<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>TerraMove Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

<style>

body{
    background:#121212;
    color:#ffffff;
}

.card{
    background:#1e1e1e;
    border:1px solid #333;
    color:#ffffff;
}

.card h5{
    color:#00e5ff;
}

.card p{
    color:#e0e0e0;
}

/* form inputs */
.form-control{
    background:#2b2b2b;
    border:1px solid #444;
    color:white;
}

.form-control::placeholder{
    color:#aaa;
}

.form-control:focus{
    background:#2b2b2b;
    color:white;
}

#riskOutput{
    font-size:1.3rem;
    font-weight:bold;
    text-align:center;
}

</style>

</head>

<body>

<div class="container my-4">

<h1 class="text-center mb-4">🌍 TerraMove Monitoring Dashboard</h1>

<div class="row g-3">

<!-- UNITS WILL STILL BE GENERATED BY script.js -->
<div id="dataDisplay" class="row g-3"></div>

<!-- SIMULATOR CARD -->
<div class="col-md-4">

<div class="card h-100 p-3">

<h5 class="text-center mb-3">⚠ Risk Level Simulator</h5>

<form id="riskForm">

<div class="row g-2">

<div class="col-4">
<input type="number" step="0.01" class="form-control form-control-sm" id="accelX" placeholder="Accel X">
</div>

<div class="col-4">
<input type="number" step="0.01" class="form-control form-control-sm" id="accelY" placeholder="Accel Y">
</div>

<div class="col-4">
<input type="number" step="0.01" class="form-control form-control-sm" id="accelZ" placeholder="Accel Z">
</div>

<div class="col-4">
<input type="number" step="0.01" class="form-control form-control-sm" id="gyroX" placeholder="Gyro X">
</div>

<div class="col-4">
<input type="number" step="0.01" class="form-control form-control-sm" id="gyroY" placeholder="Gyro Y">
</div>

<div class="col-4">
<input type="number" step="0.01" class="form-control form-control-sm" id="gyroZ" placeholder="Gyro Z">
</div>

<div class="col-6">
<input type="number" step="0.01" class="form-control form-control-sm" id="vibration" placeholder="Vibration">
</div>

<div class="col-6">
<input type="number" step="0.01" class="form-control form-control-sm" id="tilt" placeholder="Tilt">
</div>

<div class="col-6">
<input type="number" step="0.01" class="form-control form-control-sm" id="soilMoisture" placeholder="Soil Moisture">
</div>

<div class="col-6">
<input type="number" step="0.01" class="form-control form-control-sm" id="rain" placeholder="Rain">
</div>

</div>

<button type="button" class="btn btn-warning w-100 mt-3" onclick="simulateRisk()">
Compute Risk
</button>

</form>

<div id="riskOutput" class="mt-3">
Risk: -
</div>

</div>

</div>

</div>

</div>


<script type="module" src="initDatabase.js"></script>
<script type="module" src="script.js"></script>

<script>

async function simulateRisk(){

const data = {

accelX:parseFloat(accelX.value)||0,
accelY:parseFloat(accelY.value)||0,
accelZ:parseFloat(accelZ.value)||0,

gyroX:parseFloat(gyroX.value)||0,
gyroY:parseFloat(gyroY.value)||0,
gyroZ:parseFloat(gyroZ.value)||0,

vibration:parseFloat(vibration.value)||0,
tilt:parseFloat(tilt.value)||0,
soilMoisture:parseFloat(soilMoisture.value)||0,
rain:parseFloat(rain.value)||0

};

try{

const response = await fetch("YOUR_FIREBASE_FUNCTION_URL",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify(data)
});

const result = await response.json();

riskOutput.innerHTML = "Risk: " + result.riskLevel;

}catch(e){

riskOutput.innerHTML="Error computing risk";

}

}

</script>

</body>
</html>
